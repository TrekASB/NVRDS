<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8"/>
  <title>RDS Validator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap');

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #1f2937;
      --border:    #30363d;
      --ink:       #e6edf3;
      --muted:     #7d8590;
      --green:     #3fb950;
      --green-dim: #1a3a22;
      --yellow:    #d29922;
      --yellow-dim:#2d2205;
      --red:       #f85149;
      --red-dim:   #3a1212;
      --blue:      #58a6ff;
      --blue-dim:  #0d2044;
      --accent:    #58a6ff;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .header-title { flex: 1; }
    .header-title h1 {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -.3px;
      color: var(--ink);
    }
    .header-title p {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
      margin-top: 1px;
    }

    .badge {
      font-family: var(--mono);
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--muted);
      white-space: nowrap;
    }

    .btn {
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 700;
      padding: 7px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn:not(:disabled):hover { opacity: .85; }
    .btn:not(:disabled):active { transform: scale(.97); }
    .btn-primary { background: var(--blue); color: #000; }
    .btn-ghost   { background: var(--surface2); color: var(--ink); border: 1px solid var(--border); }
    .btn-danger   { background: #21262d; color: var(--red); border: 1px solid #3a1c1c; }
    .btn-colorize { background: #1a3a22; color: var(--green); border: 1px solid #2a5a32; }
    .btn-unreset  { background: #1f2937; color: var(--muted); border: 1px solid var(--border); }
    .btn-export   { background: #0d2044; color: var(--blue); border: 1px solid #1a3a6c; }

    /* ── STATUS BAR ── */
    #statusBar {
      font-family: var(--mono);
      font-size: 11px;
      padding: 6px 16px;
      background: var(--blue-dim);
      color: var(--blue);
      border-bottom: 1px solid #1a3a5c;
      flex-shrink: 0;
    }
    #statusBar.ok    { background: var(--green-dim); color: var(--green); border-color: #1a3a22; }
    #statusBar.error { background: var(--red-dim);   color: var(--red);   border-color: #3a1212; }

    /* ── MODEL SELECTOR ── */
    #modelBar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }
    #modelBar label { font-size: 11px; color: var(--muted); font-family: var(--mono); white-space: nowrap; }
    select {
      font-family: var(--mono);
      font-size: 12px;
      background: var(--surface2);
      color: var(--ink);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      flex: 1;
      min-width: 0;
    }
    select:disabled { opacity: .4; }

    /* ── MAIN LAYOUT ── */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── SUMMARY CARDS ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .card .label { font-size: 10px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: .5px; }
    .card .value { font-size: 28px; font-weight: 800; line-height: 1.1; margin-top: 4px; }
    .card .sub   { font-size: 10px; color: var(--muted); font-family: var(--mono); margin-top: 3px; }
    .card.green  { border-color: #1e4028; }
    .card.green .value { color: var(--green); }
    .card.yellow { border-color: #3a2d05; }
    .card.yellow .value { color: var(--yellow); }
    .card.red    { border-color: #3a1212; }
    .card.red .value { color: var(--red); }
    .card.blue   { border-color: #0d2044; }
    .card.blue .value { color: var(--blue); }

    /* ── PANEL ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .panel-header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel-header h3 {
      font-size: 13px;
      font-weight: 700;
      flex: 1;
    }
    .panel-header .hint {
      font-size: 10px;
      color: var(--muted);
      font-family: var(--mono);
    }

    /* ── FIELD CHART ── */
    #fieldChart { padding: 14px; display: flex; flex-direction: column; gap: 7px; }

    .field-row { display: flex; align-items: center; gap: 10px; }
    .field-name {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      width: 180px;
      flex-shrink: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .bar-track {
      flex: 1;
      height: 16px;
      background: var(--surface2);
      border-radius: 4px;
      overflow: hidden;
      display: flex;
    }
    .bar-fill-ok   { background: var(--green); height: 100%; transition: width .5s cubic-bezier(.4,0,.2,1); }
    .bar-fill-miss { background: var(--red);   height: 100%; transition: width .5s cubic-bezier(.4,0,.2,1); }
    .bar-pct {
      font-family: var(--mono);
      font-size: 10px;
      width: 36px;
      text-align: right;
      flex-shrink: 0;
      color: var(--ink);
    }
    .bar-count {
      font-family: var(--mono);
      font-size: 10px;
      width: 60px;
      text-align: right;
      flex-shrink: 0;
      color: var(--muted);
    }

    /* ── TABLE ── */
    .table-wrap { overflow: auto; max-height: 340px; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    thead th {
      background: var(--surface2);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .4px;
      padding: 8px 10px;
      text-align: left;
      position: sticky;
      top: 0;
      z-index: 1;
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid #1c2128; }
    tbody tr:hover td { background: #1c2128; }
    tbody td {
      padding: 6px 10px;
      vertical-align: middle;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--ink);
    }
    .obj-name { color: var(--blue); max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .guid     { color: var(--muted); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
    .guid:hover { color: var(--ink); }

    /* Field cells in table */
    .fc { width: 22px; height: 22px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; }
    .fc.ok   { background: var(--green-dim); color: var(--green); }
    .fc.miss { background: var(--red-dim);   color: var(--red); }

    /* ── SCORE PILL ── */
    .score {
      display: inline-block;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
    }
    .score.s100 { background: var(--green-dim); color: var(--green); }
    .score.s75  { background: #1a2a10; color: #7ee787; }
    .score.s50  { background: var(--yellow-dim); color: var(--yellow); }
    .score.s25  { background: #3a2005; color: #d08030; }
    .score.s0   { background: var(--red-dim); color: var(--red); }

    /* ── FILTER TABS ── */
    .tabs { display: flex; gap: 6px; }
    .tab {
      font-family: var(--mono);
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
    }
    .tab.active, .tab:hover { background: var(--surface2); color: var(--ink); border-color: var(--blue); }

    /* ── DONUT ── */
    #donutWrap { display: flex; align-items: center; gap: 20px; padding: 14px; }
    #donutSvg  { flex-shrink: 0; }
    .donut-legend { display: flex; flex-direction: column; gap: 6px; }
    .legend-item  { display: flex; align-items: center; gap: 8px; font-size: 11px; }
    .legend-dot   { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-text  { color: var(--muted); font-family: var(--mono); font-size: 10px; }
    .legend-val   { font-weight: 700; color: var(--ink); margin-left: auto; font-family: var(--mono); font-size: 10px; min-width: 28px; text-align: right; }

    /* ── SEARCH ── */
    #searchInput {
      font-family: var(--mono);
      font-size: 11px;
      background: var(--surface2);
      color: var(--ink);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      width: 180px;
    }
    #searchInput::placeholder { color: var(--muted); }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 13px;
    }
    .empty .icon { font-size: 36px; margin-bottom: 10px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Animate in */
    @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
    .anim { animation: fadeUp .3s ease both; }

    .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media(max-width: 640px) { .grid-2col { grid-template-columns: 1fr; } .cards { grid-template-columns: repeat(2,1fr); } }
  </style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>RDS Validator</h1>
    <p>PropertySet: 2_RDS · 16 felter</p>
  </div>
  <span class="badge" id="modelBadge">Ikke tilkoblet</span>
  <button class="btn btn-ghost" id="btnLoad" disabled>Hent modeller</button>
  <button class="btn btn-primary" id="btnValidate" disabled>▶ Valider</button>
  <button class="btn btn-colorize" id="btnColorize" disabled>🎨 Fargelegg</button>
  <button class="btn btn-unreset" id="btnUncolor" disabled>⬜ Fjern farger</button>
  <button class="btn btn-export" id="btnExport" disabled>⬇ Eksporter CSV</button>
  <button class="btn btn-danger" id="btnReset" disabled>↺ Nullstill</button>
</header>

<div id="statusBar">Kobler til Trimble Connect…</div>

<div id="modelBar">
  <label>Modell:</label>
  <select id="modelSelect" disabled><option value="">– velg modell –</option></select>
</div>

<main id="mainContent">
  <div class="empty anim">
    <div class="icon">🔍</div>
    <div>Velg en modell og trykk <strong>Valider</strong> for å starte.</div>
  </div>
</main>

<script>
// ── KONFIG ──────────────────────────────────────────
const PSET = '2_RDS';
const FIELDS = [
  { key: '01',  label: '01. RDS-tag'       },
  { key: '02',  label: '02. AAAAAA'         },
  { key: '03',  label: '03. Bnn'            },
  { key: '04',  label: '04. Bnn navn'       },
  { key: '05',  label: '05. Cnn'            },
  { key: '06',  label: '06. Cnn navn'       },
  { key: '08',  label: '08. Dnn navn'       },
  { key: '09',  label: '09. EEnnn'          },
  { key: '10',  label: '10. EEnnn navn'     },
  { key: '11',  label: '11. FFFnnn'         },
  { key: '12',  label: '12. FFFnnn navn'    },
  { key: '13',  label: '13. GGGnnn'         },
  { key: '14',  label: '14. GGGnnn navn'    },
  { key: '15',  label: '15. HHHnnnnn'       },
  { key: '16',  label: '16. HHHnnnnn navn'  },
];

const IGNORE = new Set(['IFCPROJECT','IFCSITE','IFCBUILDING','IFCBUILDINGSTOREY']);

// ── STATE ───────────────────────────────────────────
let API = null;
let allModels = [];
let validationRows = [];  // { name, guid, modelId, runtimeId, fields:{key:bool}, score, missingCount, elementType, rdsTag }
let activeFilter = 'all';
let searchTerm = '';

// ── DOM ─────────────────────────────────────────────
const $ = id => document.getElementById(id);
const btnLoad     = $('btnLoad');
const btnValidate = $('btnValidate');
const btnReset    = $('btnReset');
const btnColorize = $('btnColorize');
const btnUncolor  = $('btnUncolor');
const btnExport   = $('btnExport');
const modelSelect = $('modelSelect');
const statusBar   = $('statusBar');
const modelBadge  = $('modelBadge');
const mainContent = $('mainContent');

// ── UTILS ───────────────────────────────────────────
function norm(v){ return (v ?? '').toString().trim(); }
function esc(v){ return norm(v).replace(/[&<>"]/g, s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s])); }

function setStatus(msg, cls=''){
  statusBar.textContent = msg;
  statusBar.className = cls;
}

function lastPathPart(v){ return norm(v).split('/').pop().split('\\').pop(); }

function getModelName(m, idx){
  const direct = [
    m.name, m.modelName, m.fileName, m.filename, m.displayName,
    m.file?.name, m.model?.name, m.data?.name, m.metadata?.name
  ].map(norm).filter(Boolean);
  const ifc = direct.map(lastPathPart).find(v => /\.ifc/i.test(v));
  if (ifc) return ifc;
  if (direct.length) return lastPathPart(direct[0]);
  return `Modell ${idx + 1}`;
}

function looksLikeIfc(v){
  const s = norm(v).toUpperCase();
  return /^IFC[A-Z0-9_]+$/.test(s) ? s : '';
}

function getIfcType(obj){
  const direct = looksLikeIfc(obj.ifcType || obj.ifcEntity || obj.type || obj.className || '');
  if (direct) return direct;
  for (const ps of (obj.properties || [])) {
    for (const p of (ps.properties || [])) {
      const c = looksLikeIfc(p.value);
      if (c) return c;
    }
  }
  return '';
}

function getProp(obj, pset, propStartsWith){
  const pt = norm(pset).toLowerCase();
  const pp = norm(propStartsWith).toLowerCase();
  for (const ps of (obj.properties || [])) {
    if (norm(ps.name).toLowerCase() !== pt) continue;
    for (const p of (ps.properties || [])) {
      if (norm(p.name).toLowerCase().startsWith(pp)) return norm(p.value);
    }
  }
  return '';
}

// Get any property from a pset by partial name match (case-insensitive)
function getPropAny(obj, pset){
  const pt = norm(pset).toLowerCase();
  const result = {};
  for (const ps of (obj.properties || [])) {
    if (norm(ps.name).toLowerCase() !== pt) continue;
    for (const p of (ps.properties || [])) {
      result[norm(p.name)] = norm(p.value);
    }
  }
  return result;
}

function scoreClass(pct){
  if (pct === 100) return 's100';
  if (pct >= 75)   return 's75';
  if (pct >= 50)   return 's50';
  if (pct >= 25)   return 's25';
  return 's0';
}

// ── CONNECT ─────────────────────────────────────────
async function connect(){
  try {
    if (!window.TrimbleConnectWorkspace?.connect) throw new Error('API ikke tilgjengelig');
    API = await TrimbleConnectWorkspace.connect(window.parent, ()=>{}, 30000);
    console.log('[RDS-Val] API:', Object.keys(API));
    if (API.viewer) console.log('[RDS-Val] viewer:', Object.keys(API.viewer));
    btnLoad.disabled = false;
    setStatus('✅ Tilkoblet Trimble Connect. Trykk «Hent modeller».');
    modelBadge.textContent = 'Tilkoblet';
  } catch(e){
    setStatus('❌ ' + (e.message || e), 'error');
    modelBadge.textContent = 'Feil';
  }
}

// ── LOAD MODELS ─────────────────────────────────────
async function loadModels(){
  if (!API) return;
  btnLoad.disabled = true;
  setStatus('⏳ Leser modeller…');
  try {
    // Hent filnavn-kart
    const nameMap = new Map();
    const srcs = [
      () => API.models?.getModels?.(),
      () => API.viewer?.getModels?.(),
      () => API.project?.getModels?.(),
    ];
    for (const src of srcs) {
      try {
        const res = await src();
        if (!res) continue;
        const list = Array.isArray(res) ? res : (res.models || res.items || []);
        for (const m of list) {
          const id = norm(m.id || m.modelId || '');
          if (!id) continue;
          const fn = [m.name, m.fileName, m.filename].map(norm).find(v => /\.ifc/i.test(v));
          if (fn) nameMap.set(id, lastPathPart(fn));
        }
        if (nameMap.size) break;
      } catch {}
    }

    const objs = await API.viewer.getObjects();
    allModels = (objs || []).map((m, i) => {
      const modelId = norm(m.modelId || m.modelid || m['model Id'] || '');
      if (!modelId) return null;
      const cnt = Array.isArray(m.objects) ? m.objects.length : 0;
      const name = nameMap.get(modelId) || getModelName(m, i);
      return { modelId, name, objectCount: cnt };
    }).filter(Boolean);

    modelSelect.innerHTML = '<option value="">– velg modell –</option>'
      + allModels.map(m => `<option value="${esc(m.modelId)}">${esc(m.name)} (${m.objectCount} obj.)</option>`).join('');
    modelSelect.disabled = false;
    btnLoad.disabled = false;
    setStatus(`✅ ${allModels.length} modeller hentet. Velg modell og valider.`, 'ok');
  } catch(e){
    setStatus('❌ Feil ved henting: ' + (e.message || e), 'error');
    btnLoad.disabled = false;
  }
}

// ── VALIDATE ────────────────────────────────────────
async function validate(){
  const modelId = modelSelect.value;
  if (!modelId) { setStatus('⚠️ Velg en modell først.'); return; }
  const modelEntry = allModels.find(m => m.modelId === modelId);

  btnValidate.disabled = true;
  btnReset.disabled = true;
  setStatus('⏳ Leser objekter og validerer RDS-felter…');
  mainContent.innerHTML = '';

  try {
    const objsInfo = await API.viewer.getObjects();
    const raw = (objsInfo || []).find(m => norm(m.modelId || m.modelid || m['model Id'] || '') === modelId);
    if (!raw || !Array.isArray(raw.objects) || !raw.objects.length) {
      setStatus('⚠️ Ingen objekter funnet i valgt modell.', 'error');
      btnValidate.disabled = false;
      return;
    }

    const runtimeIds = raw.objects.map(o => o.id).filter(v => v != null);
    const total = runtimeIds.length;
    let done = 0;

    // Les i bolker på 200 for å unngå timeout
    const CHUNK = 200;
    validationRows = [];
    for (let i = 0; i < runtimeIds.length; i += CHUNK) {
      const chunk = runtimeIds.slice(i, i + CHUNK);
      const props = await API.viewer.getObjectProperties(modelId, chunk);
      for (const obj of (props || [])) {
        if (IGNORE.has(getIfcType(obj))) continue;
        const fields = {};
        let missing = 0;
        for (const f of FIELDS) {
          const val = getProp(obj, PSET, f.label.split(' ')[0] + '.');
          // Prøv også eksakt match
          const val2 = val || getProp(obj, PSET, f.label);
          fields[f.key] = !!(val || val2);
          if (!(val || val2)) missing++;
        }
        const score = Math.round(((FIELDS.length - missing) / FIELDS.length) * 100);
        let guid = '';
        try {
          const ids = await API.viewer.convertToObjectIds(modelId, [Number(obj.id)]);
          guid = ids?.[0] ? String(ids[0]) : '';
        } catch {}
        // Hent objekttype fra 0_Element PropertySet
        const elemProps = getPropAny(obj, '0_Element');
        let elementType = '';
        for (const [k, v] of Object.entries(elemProps)) {
          if (/objekttype|object.?type|type/i.test(k) && v) { elementType = v; break; }
        }
        // Fallback: prøv direkte feltnavn
        if (!elementType) elementType = elemProps['Objekttype'] || elemProps['ObjectType'] || elemProps['Object Type'] || '';

        const rdsTag = getProp(obj, PSET, '01.');

        validationRows.push({
          name: norm(obj.name || obj.objectName || ''),
          guid,
          modelId,
          runtimeId: obj.id,
          fields,
          score,
          missingCount: missing,
          elementType: norm(elementType),
          rdsTag: norm(rdsTag),
        });
      }
      done += chunk.length;
      setStatus(`⏳ Validerer… ${Math.min(done, total)} / ${total} objekter`);
    }

    renderDashboard(modelEntry);
    btnReset.disabled = false;
    btnColorize.disabled = false;
    btnExport.disabled = false;
    setStatus(`✅ Validering fullført — ${validationRows.length} objekter analysert.`, 'ok');
  } catch(e){
    setStatus('❌ Feil under validering: ' + (e.message || e), 'error');
  }
  btnValidate.disabled = false;
}

// ── RENDER ───────────────────────────────────────────
function renderDashboard(model){
  const total = validationRows.length;
  if (!total) {
    mainContent.innerHTML = '<div class="empty"><div class="icon">⚠️</div><div>Ingen relevante objekter funnet.</div></div>';
    return;
  }

  const perfect    = validationRows.filter(r => r.missingCount === 0).length;
  const withIssues = validationRows.filter(r => r.missingCount > 0).length;
  const totalChecks = total * FIELDS.length;
  const totalMissing = validationRows.reduce((s,r) => s + r.missingCount, 0);
  const totalOk = totalChecks - totalMissing;
  const fillPct = Math.round((totalOk / totalChecks) * 100);

  // Per-field stats
  const fieldStats = FIELDS.map(f => {
    const ok = validationRows.filter(r => r.fields[f.key]).length;
    return { ...f, ok, miss: total - ok, pct: Math.round((ok / total) * 100) };
  });

  mainContent.innerHTML = `
    <!-- SUMMARY CARDS -->
    <div class="cards anim">
      <div class="card blue">
        <div class="label">Objekter</div>
        <div class="value">${total}</div>
        <div class="sub">analysert</div>
      </div>
      <div class="card green">
        <div class="label">Komplett</div>
        <div class="value">${perfect}</div>
        <div class="sub">${Math.round((perfect/total)*100)}% alle felt utfylt</div>
      </div>
      <div class="card red">
        <div class="label">Mangler felt</div>
        <div class="value">${withIssues}</div>
        <div class="sub">${Math.round((withIssues/total)*100)}% har avvik</div>
      </div>
      <div class="card yellow">
        <div class="label">Feltfyllingsgrad</div>
        <div class="value">${fillPct}%</div>
        <div class="sub">${totalOk} av ${totalChecks} felt utfylt</div>
      </div>
    </div>

    <!-- CHARTS ROW -->
    <div class="grid-2col anim" style="animation-delay:.05s">
      <!-- Donut -->
      <div class="panel">
        <div class="panel-header">
          <h3>Overordnet status</h3>
          <span class="hint">per objekt · matcher 🎨 fargelegging</span>
        </div>
        <div id="donutWrap">
          <svg id="donutSvg" width="120" height="120" viewBox="0 0 120 120"></svg>
          <div class="donut-legend" id="donutLegend"></div>
        </div>
      </div>

      <!-- Field bar chart -->
      <div class="panel">
        <div class="panel-header">
          <h3>Feltdekning</h3>
          <span class="hint">grønn = utfylt · rød = mangler</span>
        </div>
        <div id="fieldChart"></div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="panel anim" style="animation-delay:.1s">
      <div class="panel-header">
        <h3>Objektliste</h3>
        <div class="tabs" id="filterTabs">
          <button class="tab active" data-filter="all">Alle (${total})</button>
          <button class="tab" data-filter="ok">✅ Komplett (${perfect})</button>
          <button class="tab" data-filter="issues">⚠️ Avvik (${withIssues})</button>
        </div>
        <input id="searchInput" type="text" placeholder="Søk navn / GUID…" style="margin-left:8px"/>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Score</th>
              <th>Navn</th>
              <th>GUID</th>
              <th>Objekttype</th>
              ${FIELDS.map(f => `<th title="${esc(f.label)}">${f.key}</th>`).join('')}
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  `;

  renderDonut(perfect, withIssues, total);
  renderFieldBars(fieldStats);
  renderTable();

  // Events
  document.getElementById('filterTabs').addEventListener('click', e => {
    const btn = e.target.closest('.tab');
    if (!btn) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderTable();
  });
  document.getElementById('searchInput').addEventListener('input', e => {
    searchTerm = e.target.value.toLowerCase();
    renderTable();
  });
}

function renderDonut(perfect, withIssues, total){
  const partial = total - perfect - withIssues;
  // Bucket: perfect, partial (1–2 missing), issues (3+)
  const p3 = validationRows.filter(r => r.missingCount === 0).length;
  const p2 = validationRows.filter(r => r.missingCount > 0 && r.missingCount <= 3).length;
  const p1 = validationRows.filter(r => r.missingCount > 3).length;

  const slices = [
    { label: 'Komplett (0 mangler)',   count: p3, color: '#3fb950' },
    { label: '1–3 felt mangler',        count: p2, color: '#d29922' },
    { label: '4+ felt mangler',         count: p1, color: '#f85149' },
  ];
  const svg = document.getElementById('donutSvg');
  const legend = document.getElementById('donutLegend');
  const cx = 60, cy = 60, r = 48, ir = 30;
  const circumference = 2 * Math.PI * r;
  let offset = 0;
  let paths = '';

  for (const s of slices) {
    const frac = total > 0 ? s.count / total : 0;
    const dashLen = frac * circumference;
    const gap = circumference - dashLen;
    paths += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}"
      stroke-width="18" stroke-dasharray="${dashLen.toFixed(2)} ${gap.toFixed(2)}"
      stroke-dashoffset="${(-offset).toFixed(2)}" style="transition:stroke-dasharray .5s"/>`;
    offset += dashLen;
  }

  const pct = total > 0 ? Math.round((p3 / total) * 100) : 0;
  svg.innerHTML = paths + `
    <circle cx="${cx}" cy="${cy}" r="${ir}" fill="var(--surface)"/>
    <text x="${cx}" y="${cy - 4}" text-anchor="middle" font-family="Syne,sans-serif" font-size="18" font-weight="800" fill="var(--ink)">${pct}%</text>
    <text x="${cx}" y="${cy + 12}" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8" fill="var(--muted)">komplett</text>
  `;

  legend.innerHTML = slices.map(s => `
    <div class="legend-item">
      <div class="legend-dot" style="background:${s.color}"></div>
      <span class="legend-text">${esc(s.label)}</span>
      <span class="legend-val">${s.count}</span>
    </div>
  `).join('');
}

function renderFieldBars(fieldStats){
  const chart = document.getElementById('fieldChart');
  chart.innerHTML = fieldStats.map(f => `
    <div class="field-row">
      <div class="field-name" title="${esc(f.label)}">${esc(f.label)}</div>
      <div class="bar-track">
        <div class="bar-fill-ok" style="width:${f.pct}%"></div>
        <div class="bar-fill-miss" style="width:${100 - f.pct}%"></div>
      </div>
      <div class="bar-pct" style="color:${f.pct === 100 ? 'var(--green)' : f.pct < 50 ? 'var(--red)' : 'var(--yellow)'}">${f.pct}%</div>
      <div class="bar-count">${f.ok}/${f.ok + f.miss}</div>
    </div>
  `).join('');
}

function renderTable(){
  let rows = validationRows;
  if (activeFilter === 'ok')       rows = rows.filter(r => r.missingCount === 0);
  if (activeFilter === 'issues')   rows = rows.filter(r => r.missingCount > 0 && r.missingCount <= 3);
  if (activeFilter === 'critical') rows = rows.filter(r => r.missingCount > 3);
  if (activeFilter === 'nords')    rows = rows.filter(r => !r.fields['01']);
  if (searchTerm) rows = rows.filter(r =>
    r.name.toLowerCase().includes(searchTerm) ||
    r.guid.toLowerCase().includes(searchTerm)
  );

  const tbody = document.getElementById('tableBody');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="${4 + FIELDS.length}" class="empty" style="padding:20px;text-align:center;color:var(--muted)">Ingen rader matcher filteret.</td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(r => {
    const sc = scoreClass(r.score);
    const cells = FIELDS.map(f =>
      `<td><span class="fc ${r.fields[f.key] ? 'ok' : 'miss'}">${r.fields[f.key] ? '✓' : '✗'}</span></td>`
    ).join('');
    return `
      <tr data-mid="${esc(r.modelId)}" data-rid="${esc(r.runtimeId)}">
        <td><span class="score ${sc}">${r.score}%</span></td>
        <td class="obj-name" title="${esc(r.name)}">${esc(r.name) || '<span style="color:var(--muted)">–</span>'}</td>
        <td class="guid" title="${esc(r.guid)}" onclick="copyGuid(this,'${esc(r.guid)}')">${esc(r.guid) ? r.guid.substring(0,12)+'…' : '–'}</td>
        <td style="color:var(--muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(r.elementType)}">${esc(r.elementType) || '–'}</td>
        ${cells}
      </tr>`;
  }).join('');

  tbody.querySelectorAll('tr[data-rid]').forEach(tr => {
    tr.addEventListener('click', async e => {
      if (e.target.classList.contains('guid')) return;
      const mid = tr.dataset.mid;
      const rid = parseInt(tr.dataset.rid);
      try { await API.viewer.setSelection({ modelObjectIds:[{ modelId:mid, objectRuntimeIds:[rid] }] }, 'set'); } catch {}
      try { await API.viewer.setCamera({ modelObjectIds:[{ modelId:mid, objectRuntimeIds:[rid] }] }, { animationTime:500 }); } catch {}
    });
  });
}

window.copyGuid = function(el, guid){
  navigator.clipboard?.writeText(guid).catch(()=>{});
  const orig = el.textContent;
  el.textContent = 'Kopiert!';
  setTimeout(() => el.textContent = orig, 1200);
};

// ── FARGELEGG ───────────────────────────────────────
async function colorizeModel(){
  if (!API || !validationRows.length) return;
  btnColorize.disabled = true;
  setStatus('🎨 Fargelegger modell…');
  try {
    await API.viewer.setObjectState(undefined, { color: 'reset' });

    // Tre kategorier som matcher donut-grafens farger:
    // Grønn  = 0 mangler (komplett)
    // Gul    = 1–3 mangler
    // Rød    = 4+ mangler
    const greenMap  = new Map();
    const yellowMap = new Map();
    const redMap    = new Map();

    for (const row of validationRows) {
      const mid = row.modelId;
      const rid = Number(row.runtimeId);
      const addTo = (map) => {
        if (!map.has(mid)) map.set(mid, []);
        map.get(mid).push(rid);
      };
      if (row.missingCount === 0)      addTo(greenMap);
      else if (row.missingCount <= 3)  addTo(yellowMap);
      else                             addTo(redMap);
    }

    const toSel = (map) => Array.from(map.entries()).map(([modelId, objectRuntimeIds]) => ({ modelId, objectRuntimeIds }));

    const gSel = toSel(greenMap);
    const ySel = toSel(yellowMap);
    const rSel = toSel(redMap);

    if (gSel.length) await API.viewer.setObjectState({ modelObjectIds: gSel }, { color: { r: 39,  g: 174, b: 96,  a: 255 } }); // Grønn
    if (ySel.length) await API.viewer.setObjectState({ modelObjectIds: ySel }, { color: { r: 210, g: 153, b: 34,  a: 255 } }); // Gul
    if (rSel.length) await API.viewer.setObjectState({ modelObjectIds: rSel }, { color: { r: 248, g: 81,  b: 73,  a: 255 } }); // Rød

    const gc = [...greenMap.values()].reduce((s,a) => s + a.length, 0);
    const yc = [...yellowMap.values()].reduce((s,a) => s + a.length, 0);
    const rc = [...redMap.values()].reduce((s,a) => s + a.length, 0);

    btnUncolor.disabled = false;
    btnColorize.disabled = false;
    setStatus(`🎨 Fargelagt: 🟢 ${gc} komplett · 🟡 ${yc} delvis · 🔴 ${rc} kritisk`, 'ok');
  } catch(e) {
    setStatus('❌ Feil ved fargelegging: ' + (e.message || e), 'error');
    btnColorize.disabled = false;
  }
}

async function removeColors(){
  if (!API) return;
  try {
    await API.viewer.setObjectState(undefined, { color: 'reset' });
    btnUncolor.disabled = true;
    setStatus('⬜ Modellfarger fjernet.', '');
  } catch(e) {
    setStatus('❌ Feil ved fjerning av farger: ' + (e.message || e), 'error');
  }
}

// ── CSV EKSPORT ──────────────────────────────────────
function exportCsv(){
  // Eksporter alle objekter der 01. RDS-tag mangler
  const missingRds = validationRows.filter(r => !r.fields['01']);

  if (!missingRds.length) {
    setStatus('✅ Ingen objekter mangler RDS-tag — ingenting å eksportere.', 'ok');
    return;
  }

  const headers = [
    'Navn',
    'GUID',
    'Objekttype (0_Element)',
    'Score (%)',
    'Antall manglende felt',
    ...FIELDS.map(f => f.label)
  ];

  const csvEsc = (v) => {
    const s = (v ?? '').toString().replace(/"/g, '""');
    return /[",

]/.test(s) ? `"${s}"` : s;
  };

  const lines = [headers.map(csvEsc).join(',')];
  for (const r of missingRds) {
    lines.push([
      csvEsc(r.name),
      csvEsc(r.guid),
      csvEsc(r.elementType),
      csvEsc(r.score),
      csvEsc(r.missingCount),
      ...FIELDS.map(f => csvEsc(r.fields[f.key] ? 'OK' : 'MANGLER'))
    ].join(','));
  }

  const bom = '﻿'; // UTF-8 BOM for Excel
  const blob = new Blob([bom + lines.join('
')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'RDS_mangler_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(a.href);

  setStatus(`⬇ Eksportert ${missingRds.length} objekter uten RDS-tag til CSV.`, 'ok');
}

// ── RESET ───────────────────────────────────────────
function reset(){
  validationRows = [];
  activeFilter = 'all';
  searchTerm = '';
  if (API) { try { API.viewer.setObjectState(undefined, { color: 'reset' }); } catch {} }
  mainContent.innerHTML = '<div class="empty anim"><div class="icon">🔍</div><div>Velg en modell og trykk <strong>Valider</strong> for å starte.</div></div>';
  btnReset.disabled = true;
  btnColorize.disabled = true;
  btnUncolor.disabled = true;
  btnExport.disabled = true;
  setStatus('↺ Nullstilt.', '');
}

// ── WIRING ──────────────────────────────────────────
btnLoad.addEventListener('click', loadModels);
btnValidate.addEventListener('click', validate);
btnColorize.addEventListener('click', colorizeModel);
btnUncolor.addEventListener('click', removeColors);
btnExport.addEventListener('click', exportCsv);
btnReset.addEventListener('click', reset);
modelSelect.addEventListener('change', () => {
  btnValidate.disabled = !modelSelect.value;
});

window.addEventListener('error', e => setStatus('❌ JS-feil: ' + e.message, 'error'));

connect();
</script>
